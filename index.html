<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Guru MI Citamiang</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#e8f5e9;margin:0;padding:20px}
.container{max-width:700px;margin:auto;background:#fff;padding:25px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
h1{text-align:center;color:#2e7d32;margin-bottom:5px}
h3{text-align:center;color:#555;margin-top:0;font-weight:400}
.login,.absen,.rekap,.daftar{display:none}
input,select,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;font-size:16px}
button{background:#2e7d32;color:#fff;border:none;cursor:pointer;font-weight:bold}
button:hover{background:#1b5e20}
.btn-logout{background:#d32f2f;margin-top:15px}
.btn-print{background:#1976d2}
.btn-secondary{background:#757575}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:14px}
th,td{border:1px solid #ddd;padding:10px;text-align:left}
th{background:#2e7d32;color:#fff}
.alert{padding:10px;border-radius:8px;margin:10px 0;display:none}
.alert-success{background:#c8e6c9;color:#2e7d32}
.alert-error{background:#ffcdd2;color:#d32f2f}
.link-daftar{text-align:center;margin-top:15px;font-size:14px}
.link-daftar a{color:#2e7d32;font-weight:bold;text-decoration:none}
</style>
</head>
<body>
<div class="container">
    <h1>ABSENSI GURU</h1>
    <h3>MI Citamiang</h3>

    <div id="loginForm" class="login" style="display:block">
        <h2>Login Guru</h2>
        <input type="text" id="nip" placeholder="Masukkan NIP">
        <input type="password" id="password" placeholder="Masukkan Password">
        <button onclick="login()">Masuk</button>
        <div class="link-daftar">Belum punya akun? <a href="#" onclick="showDaftar()">Daftar di sini</a></div>
        <div id="alertLogin" class="alert"></div>
    </div>

    <div id="daftarForm" class="daftar">
        <h2>Daftar Akun Baru</h2>
        <input type="text" id="namaBaru" placeholder="Nama Lengkap Guru">
        <input type="text" id="nipBaru" placeholder="Masukkan NIP">
        <input type="password" id="passBaru" placeholder="Buat Password">
        <button onclick="daftar()">Simpan Akun</button>
        <button class="btn-secondary" onclick="kembaliLogin()">Kembali ke Login</button>
        <div id="alertDaftar" class="alert"></div>
    </div>

    <div id="absenForm" class="absen">
        <h2>Halo, <span id="namaGuru"></span></h2>
        <p>Tanggal: <b id="tglSekarang"></b></p>
        <button onclick="absenMasuk()">Absen Masuk</button>
        <button onclick="absenPulang()">Absen Pulang</button>
        <button class="btn-print" onclick="lihatRekap()">Lihat Rekap</button>
        <button class="btn-logout" onclick="logout()">Logout</button>
        <div id="alertAbsen" class="alert"></div>
    </div>

    <div id="rekapForm" class="rekap">
        <h2>Rekap Absensi</h2>
        <button class="btn-print" onclick="window.print()">Cetak / Simpan PDF</button>
        <button onclick="kembaliAbsen()">Kembali</button>
        <table id="tabelRekap">
            <thead><tr><th>Tanggal</th><th>Nama</th><th>Masuk</th><th>Pulang</th><th>Keterangan</th></tr></thead>
            <tbody></tbody>
        </table>
        <p style="font-size:12px;color:#666;margin-top:10px">*Klik "Cetak / Simpan PDF" lalu pilih "Save as PDF" untuk ekspor</p>
    </div>
</div>

<script>
let guruLogin = null;
document.getElementById('tglSekarang').innerText = new Date().toLocaleDateString('id-ID',{weekday:'long', year:'numeric', month:'long', day:'numeric'});

// Ambil data guru dari penyimpanan HP
function getGuru(){ return JSON.parse(localStorage.getItem('guruMI') || '[]'); }
function saveGuru(d){ localStorage.setItem('guruMI', JSON.stringify(d)); }
function getData(){ return JSON.parse(localStorage.getItem('absensiMI') || '[]'); }
function saveData(d){ localStorage.setItem('absensiMI', JSON.stringify(d)); }

function showDaftar(){
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('daftarForm').style.display = 'block';
}

function kembaliLogin(){
    document.getElementById('daftarForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
}

function daftar(){
    const nama = document.getElementById('namaBaru').value.trim();
    const nip = document.getElementById('nipBaru').value.trim();
    const pass = document.getElementById('passBaru').value.trim();

    if(!nama ||!nip ||!pass){
        showAlert('alertDaftar','Nama, NIP, dan Password wajib diisi!', 'error');
        return;
    }

    const guru = getGuru();
    const ada = guru.find(x => x.nip === nip);
    if(ada){
        showAlert('alertDaftar','NIP sudah terdaftar!', 'error');
        return;
    }

    guru.push({nama:nama, nip:nip, pass:pass});
    saveGuru(guru);
    showAlert('alertDaftar','Akun berhasil dibuat! Silakan login.', 'success');

    setTimeout(()=>{
        document.getElementById('namaBaru').value = '';
        document.getElementById('nipBaru').value = '';
        document.getElementById('passBaru').value = '';
        kembaliLogin();
    }, 1500);
}

function login(){
    const nip = document.getElementById('nip').value;
    const pass = document.getElementById('password').value;
    const guru = getGuru();
    const g = guru.find(x => x.nip === nip && x.pass === pass);

    if(g){
        guruLogin = g;
        document.getElementById('namaGuru').innerText = g.nama;
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('absenForm').style.display = 'block';
    } else {
        showAlert('alertLogin','NIP atau Password salah!', 'error');
    }
}

function absenMasuk(){
    const data = getData();
    const hariIni = new Date().toISOString().split('T')[0];
    const sudah = data.find(d => d.nip === guruLogin.nip && d.tanggal === hariIni);

    if(sudah && sudah.masuk){
        showAlert('alertAbsen','Kamu sudah absen masuk hari ini', 'error');
        return;
    }

    const jam = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    if(sudah){
        sudah.masuk = jam;
    } else {
        data.push({nip:guruLogin.nip, nama:guruLogin.nama, tanggal:hariIni, masuk:jam, pulang:'', ket:'Hadir'});
    }
    saveData(data);
    showAlert('alertAbsen',`Absen Masuk berhasil jam ${jam}`, 'success');
}

function absenPulang(){
    const data = getData();
    const hariIni = new Date().toISOString().split('T')[0];
    const d = data.find(x => x.nip === guruLogin.nip && x.tanggal === hariIni);

    if(!d ||!d.masuk){
        showAlert('alertAbsen','Absen masuk dulu!', 'error');
        return;
    }
    if(d.pulang){
        showAlert('alertAbsen','Kamu sudah absen pulang hari ini', 'error');
        return;
    }

    d.pulang = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    saveData(data);
    showAlert('alertAbsen',`Absen Pulang berhasil jam ${d.pulang}`, 'success');
}

function lihatRekap(){
    document.getElementById('absenForm').style.display = 'none';
    document.getElementById('rekapForm').style.display = 'block';
    const data = getData().sort((a,b) => b.tanggal.localeCompare(a.tanggal));
    const tbody = document.querySelector('#tabelRekap tbody');
    tbody.innerHTML = '';
    data.forEach(d => {
        tbody.innerHTML += `<tr><td>${d.tanggal}</td><td>${d.nama}</td><td>${d.masuk || '-'}</td><td>${d.pulang || '-'}</td><td>${d.ket}</td></tr>`;
    });
}

function kembaliAbsen(){
    document.getElementById('rekapForm').style.display = 'none';
    document.getElementById('absenForm').style.display = 'block';
}

function logout(){
    guruLogin = null;
    document.getElementById('absenForm').style.display = 'none';
    document.getElementById('rekapForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('nip').value = '';
    document.getElementById('password').value = '';
}

function showAlert(id, msg, type){
    const el = document.getElementById(id);
    el.className = 'alert alert-' + type;
    el.innerText = msg;
    el.style.display = 'block';
    setTimeout(()=> el.style.display='none', 3000);
}
</script>
</body>
</html>
